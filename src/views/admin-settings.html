<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Settings | Kavanah Pouch Admin</title>
  <style>
    *{box-sizing:border-box}
    :root{--navy:#001f42;--gold:#d6a23a;--cream:#f8f1df;--ink:#132133;--muted:#667085;--line:rgba(19,33,51,.12);--sidebar:220px}
    body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:#f4f6f9;color:var(--ink);display:flex;min-height:100vh}
    a{color:inherit;text-decoration:none}
    .sidebar{width:var(--sidebar);background:var(--navy);color:var(--cream);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
    .sidebar-brand{padding:1.4rem 1.2rem 1rem;font-weight:800;font-size:1rem;letter-spacing:.04em;color:var(--gold);border-bottom:1px solid rgba(248,241,223,.12)}
    .sidebar-nav a{display:flex;align-items:center;gap:.6rem;padding:.7rem 1.2rem;font-size:.88rem;font-weight:600;color:rgba(248,241,223,.78)}
    .sidebar-nav a:hover,.sidebar-nav a.active{background:rgba(214,162,58,.14);color:var(--gold)}
    .sidebar-nav a.active{border-left:3px solid var(--gold)}
    .sidebar-footer{padding:1rem 1.2rem;border-top:1px solid rgba(248,241,223,.12)}
    .sidebar-footer form button{background:none;border:none;color:rgba(248,241,223,.5);font:inherit;font-size:.82rem;cursor:pointer;padding:0}
    .main{flex:1;overflow:auto}
    .topbar{background:#fff;border-bottom:1px solid var(--line);padding:.9rem 1.6rem}
    .topbar h1{margin:0;font-size:1.2rem;font-weight:800}
    .content{padding:1.6rem;max-width:520px}
    .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:1.6rem;box-shadow:0 2px 8px rgba(0,31,66,.05)}
    .card h2{margin:0 0 1.2rem;font-size:1rem;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.06em}
    label{display:grid;gap:.3rem;font-size:.85rem;font-weight:700;color:var(--muted);margin-bottom:.85rem}
    input{width:100%;border:1px solid var(--line);border-radius:10px;background:#f9fafb;color:var(--ink);padding:.65rem .8rem;font:inherit;outline:none}
    input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(214,162,58,.18)}
    .btn{padding:.65rem 1.4rem;border-radius:999px;font:inherit;font-size:.88rem;font-weight:700;cursor:pointer;border:none}
    .btn-navy{background:var(--navy);color:var(--cream)}
    .btn-navy:hover{background:#0a3060}
    .alert{border-radius:10px;padding:.65rem 1rem;font-size:.85rem;font-weight:600;margin-bottom:1rem}
    .alert-success{background:#dcfce7;border:1px solid #86efac;color:#16a34a}
    .alert-error{background:#fee2e2;border:1px solid #fca5a5;color:#dc2626}
    .hint{font-size:.78rem;color:var(--muted);margin-top:.3rem;font-weight:400}
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-brand">⬡ Kavanah Pouch</div>
    <nav class="sidebar-nav">
      <a href="/admin">Dashboard</a>
      <a href="/admin/orders">Orders</a>
      <a href="/admin/inventory">Inventory</a>
      <a href="/admin/waitlist">Waitlist</a>
      <a href="/admin/bulk-inquiries">Bulk Inquiries</a>
      <a href="/admin/support">Support</a>
      <a href="/admin/feedback">Feedback</a>
      <a href="/admin/settings" class="active">Settings</a>
    </nav>
    <div class="sidebar-footer">
      <form method="POST" action="/admin/logout"><button type="submit">Sign out</button></form>
    </div>
  </aside>

  <div class="main">
    <div class="topbar"><h1>Settings</h1></div>
    <div class="content">
      <div class="card">
        <h2>Change Password</h2>
        <div id="alert" style="display:none" class="alert"></div>
        <form method="POST" action="/admin/settings/change-password">
          <label>
            Current Password
            <input type="password" name="current_password" autocomplete="current-password" required/>
          </label>
          <label>
            New Password
            <input type="password" name="new_password" autocomplete="new-password" required minlength="8"/>
            <span class="hint">Minimum 8 characters</span>
          </label>
          <label>
            Confirm New Password
            <input type="password" name="confirm_password" autocomplete="new-password" required minlength="8"/>
          </label>
          <button class="btn btn-navy" type="submit">Update Password</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    const p = new URLSearchParams(location.search);
    const el = document.getElementById('alert');
    const msgs = {
      saved:    ['alert-success', '✓ Password updated successfully.'],
      mismatch: ['alert-error',   'New passwords do not match.'],
      wrong:    ['alert-error',   'Current password is incorrect.'],
      invalid:  ['alert-error',   'New password must be at least 8 characters.'],
      server:   ['alert-error',   'Server error — please try again.'],
    };
    const key = p.get('saved') ? 'saved' : p.get('error');
    if (key && msgs[key]) {
      el.className = 'alert ' + msgs[key][0];
      el.textContent = msgs[key][1];
      el.style.display = 'block';
    }
  </script>
</body>
</html>
