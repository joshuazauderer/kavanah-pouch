<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Reset Password | Kavanah Pouch Admin</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:#001f42;color:#f8f1df;display:grid;place-items:center;min-height:100vh;}
    .card{background:rgba(248,241,223,.07);border:1px solid rgba(248,241,223,.16);border-radius:24px;padding:2.5rem;width:min(400px,calc(100%-2rem));box-shadow:0 24px 70px rgba(0,0,0,.3)}
    h1{margin:0 0 .3rem;font-size:1.5rem;font-family:Georgia,serif}
    .sub{color:rgba(248,241,223,.6);font-size:.9rem;margin:0 0 2rem}
    label{display:grid;gap:.3rem;font-size:.88rem;font-weight:700;margin-bottom:1rem;color:rgba(248,241,223,.8)}
    input{width:100%;border:1px solid rgba(248,241,223,.2);border-radius:10px;background:rgba(248,241,223,.08);color:#f8f1df;padding:.8rem .9rem;font:inherit;outline:none}
    input:focus{border-color:#d6a23a;box-shadow:0 0 0 3px rgba(214,162,58,.2)}
    .btn{width:100%;padding:.9rem;border:none;border-radius:999px;background:#d6a23a;color:#001f42;font:inherit;font-weight:800;cursor:pointer;margin-top:.5rem;transition:background 180ms}
    .btn:hover{background:#e0b353}
    .alert{border-radius:10px;padding:.75rem 1rem;font-size:.88rem;margin-bottom:1rem}
    .alert-error{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
    .brand{text-align:center;margin-bottom:1.8rem;font-size:1.1rem;font-weight:700;color:#d6a23a;letter-spacing:.05em;text-transform:uppercase}
    .hint{font-size:.78rem;color:rgba(248,241,223,.4);margin-top:.2rem;font-weight:400}
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">Kavanah Pouch · Admin</div>
    <h1>Set New Password</h1>
    <p class="sub">Choose a new password for your admin account.</p>
    <div id="alert" style="display:none" class="alert alert-error"></div>
    <form method="POST" id="form">
      <label>
        New Password
        <input type="password" name="new_password" autocomplete="new-password" required minlength="8" autofocus/>
        <span class="hint">Minimum 8 characters</span>
      </label>
      <label>
        Confirm New Password
        <input type="password" name="confirm_password" autocomplete="new-password" required minlength="8"/>
      </label>
      <button class="btn" type="submit">Reset Password</button>
    </form>
  </div>
  <script>
    // Set form action to current URL (preserves the token in the path)
    document.getElementById('form').action = location.pathname;

    const p = new URLSearchParams(location.search);
    const el = document.getElementById('alert');
    const msgs = {
      mismatch: 'Passwords do not match.',
      invalid:  'Password must be at least 8 characters.',
      server:   'Server error — please try again.',
    };
    const key = p.get('error');
    if (key && msgs[key]) {
      el.textContent = msgs[key];
      el.style.display = 'block';
    }
  </script>
</body>
</html>
