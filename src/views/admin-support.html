<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Support | Kavanah Pouch Admin</title>
  <style>
    *{box-sizing:border-box}
    :root{--navy:#001f42;--gold:#d6a23a;--cream:#f8f1df;--ink:#132133;--muted:#667085;--line:rgba(19,33,51,.12);--sidebar:220px}
    body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:#f4f6f9;color:var(--ink);display:flex;min-height:100vh}
    a{color:inherit;text-decoration:none}
    .sidebar{width:var(--sidebar);background:var(--navy);color:var(--cream);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
    .sidebar-brand{padding:1.4rem 1.2rem 1rem;font-weight:800;font-size:1rem;letter-spacing:.04em;color:var(--gold);border-bottom:1px solid rgba(248,241,223,.12)}
    .sidebar-nav a{display:flex;align-items:center;gap:.6rem;padding:.7rem 1.2rem;font-size:.88rem;font-weight:600;color:rgba(248,241,223,.78)}
    .sidebar-nav a:hover,.sidebar-nav a.active{background:rgba(214,162,58,.14);color:var(--gold)}
    .sidebar-nav a.active{border-left:3px solid var(--gold)}
    .sidebar-footer{padding:1rem 1.2rem;border-top:1px solid rgba(248,241,223,.12)}
    .sidebar-footer form button{background:none;border:none;color:rgba(248,241,223,.5);font:inherit;font-size:.82rem;cursor:pointer;padding:0}
    .main{flex:1;overflow:auto}
    .topbar{background:#fff;border-bottom:1px solid var(--line);padding:.9rem 1.6rem}
    .topbar h1{margin:0;font-size:1.2rem;font-weight:800}
    .content{padding:1.6rem;display:grid;gap:1rem}
    .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:1.4rem;box-shadow:0 2px 8px rgba(0,31,66,.05)}
    .card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:.75rem}
    .card-header h3{margin:0;font-size:1rem}
    .meta{font-size:.8rem;color:var(--muted)}
    .badge{display:inline-flex;padding:.22rem .55rem;border-radius:999px;font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
    .badge-new{background:#fee2e2;color:#dc2626}
    .badge-in_progress{background:#dbeafe;color:#1d4ed8}
    .badge-resolved{background:#dcfce7;color:#16a34a}
    .badge-closed{background:#f3f4f6;color:#6b7280}
    .message{font-size:.88rem;color:var(--muted);line-height:1.6;white-space:pre-wrap;word-break:break-word}
    select{border:1px solid var(--line);border-radius:8px;padding:.4rem .6rem;font:inherit;font-size:.82rem;background:#f9fafb;cursor:pointer}
    .detail-row{display:flex;flex-wrap:wrap;gap:.4rem 1.4rem;font-size:.82rem;color:var(--muted);margin-bottom:.4rem}
    .empty{text-align:center;padding:3rem;color:var(--muted)}
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-brand">⬡ Kavanah Pouch</div>
    <nav class="sidebar-nav">
      <a href="/admin">Dashboard</a>
      <a href="/admin/orders">Orders</a>
      <a href="/admin/inventory">Inventory</a>
      <a href="/admin/waitlist">Waitlist</a>
      <a href="/admin/bulk-inquiries">Bulk Inquiries</a>
      <a href="/admin/support" class="active">Support</a>
      <a href="/admin/feedback">Feedback</a>
      <a href="/admin/analytics">Analytics</a>
      <a href="/admin/settings">Settings</a>
    </nav>
    <div class="sidebar-footer">
      <form method="POST" action="/admin/logout"><button type="submit">Sign out</button></form>
    </div>
  </aside>
  <div class="main">
    <div class="topbar"><h1>Support Messages</h1></div>
    <div class="content" id="content"><p style="color:var(--muted)">Loading…</p></div>
  </div>
  <script>
    const statusMap={new:'badge-new',in_progress:'badge-in_progress',resolved:'badge-resolved',closed:'badge-closed'};
    function fmtDate(d){return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}

    fetch('/admin/api/support').then(r=>r.json()).then(rows=>{
      const el=document.getElementById('content');
      if(!rows.length){el.innerHTML='<p class="empty">No support messages yet.</p>';return;}
      el.innerHTML=rows.map(r=>`
        <div class="card">
          <div class="card-header">
            <div>
              <h3>${r.name||r.email}</h3>
              <div class="detail-row">
                <span><a href="mailto:${r.email}">${r.email}</a></span>
                ${r.category?`<span><strong>Topic:</strong> ${r.category}</span>`:''}
                ${r.order_number?`<span><strong>Order:</strong> <a href="/admin/orders" style="color:var(--gold)">${r.order_number}</a></span>`:''}
                <span class="meta">${fmtDate(r.created_at)}</span>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:.5rem">
              <span class="badge ${statusMap[r.status]||''}">${r.status}</span>
              <select onchange="updateStatus(${r.id},this.value)">
                ${['new','in_progress','resolved','closed'].map(s=>`<option value="${s}"${r.status===s?' selected':''}>${s}</option>`).join('')}
              </select>
            </div>
          </div>
          <div class="message">${(r.message||'').replace(/</g,'&lt;')}</div>
        </div>`).join('');
    });

    function updateStatus(id,status){
      fetch(`/admin/support/${id}/status`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})})
        .catch(()=>alert('Save failed'));
    }
  </script>
</body>
</html>
