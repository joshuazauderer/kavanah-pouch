<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Forgot Password | Kavanah Pouch Admin</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:#001f42;color:#f8f1df;display:grid;place-items:center;min-height:100vh;}
    .card{background:rgba(248,241,223,.07);border:1px solid rgba(248,241,223,.16);border-radius:24px;padding:2.5rem;width:min(400px,calc(100%-2rem));box-shadow:0 24px 70px rgba(0,0,0,.3)}
    h1{margin:0 0 .3rem;font-size:1.5rem;font-family:Georgia,serif}
    .sub{color:rgba(248,241,223,.6);font-size:.9rem;margin:0 0 2rem;line-height:1.6}
    label{display:grid;gap:.3rem;font-size:.88rem;font-weight:700;margin-bottom:1rem;color:rgba(248,241,223,.8)}
    input{width:100%;border:1px solid rgba(248,241,223,.2);border-radius:10px;background:rgba(248,241,223,.08);color:#f8f1df;padding:.8rem .9rem;font:inherit;outline:none}
    input:focus{border-color:#d6a23a;box-shadow:0 0 0 3px rgba(214,162,58,.2)}
    .btn{width:100%;padding:.9rem;border:none;border-radius:999px;background:#d6a23a;color:#001f42;font:inherit;font-weight:800;cursor:pointer;margin-top:.5rem;transition:background 180ms}
    .btn:hover{background:#e0b353}
    .alert{border-radius:10px;padding:.75rem 1rem;font-size:.88rem;margin-bottom:1rem}
    .alert-success{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#86efac}
    .alert-error{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
    .brand{text-align:center;margin-bottom:1.8rem;font-size:1.1rem;font-weight:700;color:#d6a23a;letter-spacing:.05em;text-transform:uppercase}
    .back{display:block;text-align:center;margin-top:1.2rem;font-size:.85rem;color:rgba(248,241,223,.5);text-decoration:none}
    .back:hover{color:#d6a23a}
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">Kavanah Pouch · Admin</div>
    <h1>Forgot Password</h1>
    <p class="sub">Enter your admin email and we&#8217;ll send you a link to reset your password.</p>
    <div id="alert" style="display:none" class="alert"></div>
    <form method="POST" action="/admin/forgot-password" id="form">
      <label>Email <input type="email" name="email" autocomplete="username" required autofocus/></label>
      <button class="btn" type="submit">Send Reset Link</button>
    </form>
    <a class="back" href="/admin/login">← Back to sign in</a>
  </div>
  <script>
    const p = new URLSearchParams(location.search);
    const el = document.getElementById('alert');
    if (p.get('sent') === '1') {
      el.className = 'alert alert-success';
      el.textContent = 'If that email is registered, a reset link has been sent. Check your inbox.';
      el.style.display = 'block';
      document.getElementById('form').style.display = 'none';
    }
    if (p.get('error') === 'expired') {
      el.className = 'alert alert-error';
      el.textContent = 'That reset link has expired or already been used. Please request a new one.';
      el.style.display = 'block';
    }
    if (p.get('error') === 'server') {
      el.className = 'alert alert-error';
      el.textContent = 'Server error — please try again.';
      el.style.display = 'block';
    }
  </script>
</body>
</html>
