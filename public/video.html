<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kavanah Pouch — Daven Without Distractions</title>
  <meta name="description" content="Daven without distractions. See how the Kavanah Pouch works." />

  <!-- Open Graph -->
  <meta property="og:type"        content="video.other" />
  <meta property="og:url"         content="https://kavanahpouch.com/video" />
  <meta property="og:title"       content="Kavanah Pouch" />
  <meta property="og:description" content="Daven without distractions." />
  <meta property="og:image"       content="https://kavanahpouch.com/assets/video-poster.jpg" />
  <meta property="og:image:width"  content="1280" />
  <meta property="og:image:height" content="720" />
  <meta property="og:video"       content="https://kavanahpouch.com/assets/kavanah-pouch-video-1080p.mp4" />
  <meta property="og:video:type"  content="video/mp4" />
  <meta property="og:site_name"   content="Kavanah Pouch" />

  <!-- Twitter / X Card -->
  <meta name="twitter:card"        content="player" />
  <meta name="twitter:title"       content="Kavanah Pouch" />
  <meta name="twitter:description" content="Daven without distractions." />
  <meta name="twitter:image"       content="https://kavanahpouch.com/assets/video-poster.jpg" />
  <meta name="twitter:player"      content="https://kavanahpouch.com/video" />
  <meta name="twitter:player:width"  content="1280" />
  <meta name="twitter:player:height" content="720" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --navy:      #001f42;
      --navy-deep: #00172f;
      --gold:      #d6a23a;
      --cream:     #f8f1df;
      --serif:     "Cormorant Garamond", Georgia, serif;
      --sans:      "Inter", system-ui, sans-serif;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: radial-gradient(ellipse at 50% 0%, rgba(214,162,58,.10) 0%, transparent 55%),
                  linear-gradient(160deg, var(--navy) 0%, var(--navy-deep) 100%);
      color: var(--cream);
      font-family: var(--sans);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .page {
      width: 100%;
      max-width: 1200px;
      padding: clamp(1.5rem, 4vw, 3rem) clamp(1rem, 4vw, 3rem);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(1.2rem, 2.5vw, 2rem);
    }

    /* ── Wordmark ──────────────────────────────────────────────── */
    .wordmark {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      text-decoration: none;
      color: inherit;
    }
    .wordmark-name {
      font-family: var(--serif);
      font-size: clamp(1.8rem, 4vw, 3.2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--cream);
    }
    .wordmark-name span { color: var(--gold); }
    .wordmark-tagline {
      font-size: clamp(0.65rem, 1.2vw, 0.82rem);
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(214,162,58,.75);
    }

    /* ── Video ─────────────────────────────────────────────────── */
    .video-wrap {
      width: 100%;
      position: relative;
      border-radius: clamp(10px, 1.5vw, 18px);
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(214,162,58,.22),
        0 40px 100px rgba(0,0,0,.55);
      background: #000;
    }
    .video-wrap::before {
      /* 16:9 aspect ratio */
      content: "";
      display: block;
      padding-top: 56.25%;
    }
    .video-wrap video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* ── CTA button ────────────────────────────────────────────── */
    .cta-btn {
      display: inline-block;
      background: var(--gold);
      color: var(--navy);
      font-family: var(--sans);
      font-size: clamp(0.9rem, 1.5vw, 1.05rem);
      font-weight: 800;
      letter-spacing: 0.02em;
      padding: clamp(0.75rem, 1.5vw, 1rem) clamp(1.6rem, 3vw, 2.4rem);
      border-radius: 999px;
      text-decoration: none;
      box-shadow: 0 10px 36px rgba(214,162,58,.30);
      transition: background 150ms, transform 150ms, box-shadow 150ms;
    }
    .cta-btn:hover {
      background: #e0b353;
      transform: translateY(-2px);
      box-shadow: 0 14px 44px rgba(214,162,58,.38);
    }
    .cta-btn:active { transform: translateY(0); }

    /* ── Footer note ───────────────────────────────────────────── */
    .footer-note {
      font-size: 0.78rem;
      color: rgba(248,241,223,.35);
      letter-spacing: 0.04em;
    }

    /* ── Responsive breakpoints ────────────────────────────────── */
    /* Tablet */
    @media (max-width: 900px) {
      .page { max-width: 720px; }
    }

    /* Mobile */
    @media (max-width: 600px) {
      .page {
        padding: 1.4rem 1rem;
        gap: 1.2rem;
      }
      .video-wrap { border-radius: 10px; }
    }
  </style>
</head>
<body>
  <div class="page">

    <a class="wordmark" href="/" aria-label="Kavanah Pouch — go to product page">
      <div class="wordmark-name">Kavanah <span>Pouch</span></div>
      <div class="wordmark-tagline">Signal-Blocking Phone Pouch</div>
    </a>

    <div class="video-wrap">
      <video
        controls
        playsinline
        preload="metadata"
        poster="/assets/video-poster.jpg"
        aria-label="Kavanah Pouch product video"
      >
        <source src="/assets/kavanah-pouch-video-1080p.mp4" type="video/mp4">
        <p>Your browser does not support HTML video.
           <a href="/assets/kavanah-pouch-video-1080p.mp4" style="color:var(--gold)">Download the video</a>.
        </p>
      </video>
    </div>

    <a class="cta-btn" href="/">Learn More &amp; Order</a>

    <p class="footer-note">kavanahpouch.com</p>

  </div>
  <script src="/analytics.js"></script>
</body>
</html>
